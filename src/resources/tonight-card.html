<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ce merită văzut diseară</title>
<style>
  /* Self-contained by design: MCP Apps iframes run under a strict CSP —
     no external fonts, images or scripts. System font stack only. */
  :root {
    --bg: #f6f4ef; --card: #ffffff; --fg: #1a1d24; --muted: #5c6270;
    --line: #e3e0d8; --accent: #b45309; --accent-soft: #fef3c7;
    --chip: #eef1f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12151c; --card: #1a1e28; --fg: #edeef2; --muted: #9aa1b0;
      --line: #2a2f3c; --accent: #f59e0b; --accent-soft: #3a2e14;
      --chip: #232936;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); padding: 12px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }
  .eyebrow {
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .decision {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 16px 18px; margin-bottom: 12px;
  }
  .decision h1 { font-size: 22px; line-height: 1.2; margin: 2px 0 6px; }
  .meta { color: var(--muted); font-size: 13px; }
  .meta b { color: var(--fg); font-weight: 600; }
  .badge {
    display: inline-block; background: var(--accent-soft); color: var(--accent);
    border-radius: 999px; padding: 2px 10px; font-size: 11px; font-weight: 600;
    letter-spacing: .04em; margin-bottom: 6px;
  }
  .reason { margin-top: 8px; font-size: 13px; color: var(--muted); }
  .rail { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  @media (max-width: 480px) { .rail { grid-template-columns: 1fr; } }
  .pick {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 10px 12px; text-decoration: none; color: var(--fg); display: block;
  }
  .pick:hover { border-color: var(--accent); }
  .pick .kind {
    font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }
  .pick .t { font-weight: 600; font-size: 14px; line-height: 1.25; }
  .pick .d { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .stats { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .stat {
    background: var(--chip); border-radius: 8px; padding: 5px 10px;
    font-size: 12px; color: var(--muted);
  }
  .stat b { color: var(--fg); font-variant-numeric: tabular-nums; }
  .foot { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; gap: 8px; }
  .foot a { color: var(--accent); text-decoration: none; }
  #state { color: var(--muted); padding: 24px 8px; text-align: center; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div id="state">Se încarcă alegerile serii…</div>
  <div id="card" class="hidden">
    <div class="eyebrow">Ce merită văzut diseară</div>
    <div class="decision">
      <span id="badge" class="badge hidden"></span>
      <h1 id="d-title"></h1>
      <div class="meta" id="d-meta"></div>
      <div class="reason" id="d-reason"></div>
    </div>
    <div class="eyebrow">Raftul serii — o alegere pe verticală</div>
    <div class="rail" id="rail"></div>
    <div class="stats" id="stats"></div>
    <div class="foot">
      <span id="gen"></span>
      <a id="site" href="https://tv.madeinro.eu" target="_blank" rel="noopener">tv.madeinro.eu →</a>
    </div>
  </div>
</div>
<script>
(function () {
  'use strict';
  var KIND_LABEL = { tv: 'TV', streaming: 'Streaming', teatru: 'Teatru', cinema: 'Cinema' };
  var rpcId = 0;

  function post(msg) { window.parent.postMessage(msg, '*'); }

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function render(data) {
    if (!data || !data.rail) {
      document.getElementById('state').textContent = 'Datele serii nu sunt disponibile.';
      return;
    }
    var d = data.decision;
    if (d) {
      document.getElementById('d-title').textContent = d.title || '';
      var meta = [];
      if (d.channel) meta.push('<b>' + esc(d.channel) + '</b>');
      if (d.localTime) meta.push('Diseară · ' + esc(d.localTime));
      if (d.durationMin) meta.push(esc(d.durationMin) + ' min');
      document.getElementById('d-meta').innerHTML = meta.join(' · ');
      // The importance score is shown ONLY when the decision really came
      // from the importance model — the film fallback has no honest score.
      if (d.decisionType === 'importance' && typeof d.score === 'number') {
        var b = document.getElementById('badge');
        b.textContent = 'Eveniment important · scor ' + d.score.toFixed(2);
        b.classList.remove('hidden');
      }
      if (d.reason) document.getElementById('d-reason').textContent = d.reason;
    }
    var rail = document.getElementById('rail');
    ['tv', 'streaming', 'teatru', 'cinema'].forEach(function (k) {
      var p = data.rail[k];
      if (!p) return;
      var a = document.createElement('a');
      a.className = 'pick';
      a.href = p.url || 'https://tv.madeinro.eu';
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = '<div class="kind">' + esc(KIND_LABEL[k] || k) + ' · Alegerea zilei</div>' +
        '<div class="t">' + esc(p.title) + '</div>' +
        (p.detail ? '<div class="d">' + esc(p.detail) + '</div>' : '');
      rail.appendChild(a);
    });
    var s = data.stats || {};
    // Romanian numeral grammar: 1 takes the singular; "de" appears from 20
    // up, except compounds ending in 01–19 (101 canale, 1290 DE proiecții).
    function roCount(n, sg, pl) {
      var noun = n === 1 ? sg : pl;
      var tail = n % 100;
      var de = (n >= 20 && !(tail >= 1 && tail <= 19)) ? 'de ' : '';
      return { n: n, rest: de + noun };
    }
    var statDefs = [
      [s.moviesOnTvTonight, 'film diseară la TV', 'filme diseară la TV'],
      [s.cinemaScreeningsToday, 'proiecție cinema azi', 'proiecții cinema azi'],
      [s.theaterOnlineCount, 'piesă de teatru online', 'piese de teatru online'],
      [s.channelsMonitored, 'canal monitorizat', 'canale monitorizate'],
    ];
    var statsEl = document.getElementById('stats');
    statDefs.forEach(function (def) {
      if (def[0] == null) return; // unmeasured -> omitted, never invented
      var c = roCount(def[0], def[1], def[2]);
      var el = document.createElement('span');
      el.className = 'stat';
      el.innerHTML = '<b>' + esc(c.n) + '</b> ' + esc(c.rest);
      statsEl.appendChild(el);
    });
    if (data.generated_at) {
      var t = new Date(data.generated_at);
      document.getElementById('gen').textContent =
        'Date generate la ' + t.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit' });
    }
    document.getElementById('state').classList.add('hidden');
    document.getElementById('card').classList.remove('hidden');
  }

  function extractResult(params) {
    if (params && params.structuredContent) return params.structuredContent;
    try {
      var text = params && params.content && params.content[0] && params.content[0].text;
      return text ? JSON.parse(text) : null;
    } catch (e) { return null; }
  }

  window.addEventListener('message', function (ev) {
    var msg = ev.data;
    if (!msg || msg.jsonrpc !== '2.0') return;
    if (msg.method === 'ui/notifications/tool-result') {
      render(extractResult(msg.params));
    }
  });

  // MCP Apps handshake: ui/initialize request, then the initialized
  // notification; the host follows with tool-input / tool-result.
  post({ jsonrpc: '2.0', id: ++rpcId, method: 'ui/initialize', params: {} });
  post({ jsonrpc: '2.0', method: 'ui/notifications/initialized' });
})();
</script>
</body>
</html>
